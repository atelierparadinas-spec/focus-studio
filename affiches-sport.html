<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOCUS — 100 Affiches Sport · A4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}

.site-header{
  padding:40px 40px 24px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:32px;
}
.site-title{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#F3EFE6;letter-spacing:8px;line-height:1}
.site-sub{font-size:10px;letter-spacing:4px;color:rgba(243,239,230,.3);text-transform:uppercase;margin-top:6px;}
.site-actions{display:flex;gap:12px;align-items:center;}
.btn-print{
  padding:10px 22px;background:#162035;color:#F3EFE6;border:none;
  font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;border-radius:2px;transition:background .2s;
}
.btn-print:hover{background:#2a3d5c;}

.filters{
  padding:0 40px 28px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.filter-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase;margin-right:4px;}
.fbtn{
  padding:5px 14px;border:1px solid rgba(255,255,255,.12);background:none;
  color:rgba(255,255,255,.35);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;border-radius:2px;transition:all .15s;font-family:'Inter',sans-serif;
}
.fbtn:hover,.fbtn.on{border-color:rgba(255,255,255,.4);color:#fff;}
.sep{width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 4px;}

.gallery{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:0 40px 60px;
}
.poster-wrap{
  position:relative;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  aspect-ratio:210/297;
  overflow:hidden;
}
.poster-wrap:hover{transform:translateY(-3px);box-shadow:0 20px 60px rgba(0,0,0,.6);}
.poster-wrap svg{width:100%;height:100%;display:block;}
.poster-num{
  position:absolute;bottom:7px;right:9px;
  font-size:8px;letter-spacing:1px;opacity:.3;
  font-family:'Inter',sans-serif;pointer-events:none;
}
.poster-wrap.hidden{display:none;}

@media print{
  body{background:#fff;}
  .site-header,.filters{display:none!important;}
  .gallery{display:block;padding:0;gap:0;}
  .poster-wrap{
    page-break-after:always;break-after:page;
    width:210mm;height:297mm;
    aspect-ratio:auto;
    transform:none!important;
    box-shadow:none!important;
  }
  .poster-wrap svg{width:210mm;height:297mm;}
}

@media(max-width:1200px){.gallery{grid-template-columns:repeat(4,1fr);}}
@media(max-width:900px){.gallery{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.gallery{grid-template-columns:repeat(2,1fr);padding:0 12px 40px;}}
</style>
</head>
<body>

<div class="site-header">
  <div>
    <div class="site-title">FOCUS</div>
    <div class="site-sub">Collection Affiches Sport — 100 Designs · Format A4</div>

  <div class="site-actions">
    <button class="btn-print" onclick="window.print()">↓ Imprimer / PDF</button>

<div class="filters" id="filters">
  <span class="filter-label">Sport</span>
  <button class="fbtn on" data-f="sport" data-v="all" onclick="filter('sport','all',this)">Tout</button>
  <div class="sep"></div>
  <span class="filter-label">Couleur</span>
  <button class="fbtn on" data-f="pal" data-v="all" onclick="filter('pal','all',this)">Tout</button>
</div>

<div class="gallery" id="gallery"></div>

// ─── GENERATE 100 POSTERS (20 sports × 5 palettes) ────────────────
const ALL = [];
SPORTS.forEach((s,si) => PAL.forEach((p,pi) => ALL.push({s,p,n:si*5+pi+1})));

// ─── RENDER POSTER SVG ─────────────────────────────────────────────
function poster({s, p, n}){
  const {bg,fg,acc} = p;
  return `<div class="poster-wrap" data-sport="${s.id}" data-pal="${p.id}">
    <svg viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
      <rect width="210" height="297" fill="${bg}"/>
      <!-- subtle corner marks -->
      <line x1="8" y1="8" x2="22" y2="8" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="8" y1="8" x2="8" y2="22" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="202" y1="8" x2="188" y2="8" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="202" y1="8" x2="202" y2="22" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="8" y1="289" x2="22" y2="289" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="8" y1="289" x2="8" y2="275" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="202" y1="289" x2="188" y2="289" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <line x1="202" y1="289" x2="202" y2="275" stroke="${fg}" stroke-width="0.6" opacity="0.25"/>
      <!-- FOCUS top -->
      <text x="105" y="22" font-family="'Bebas Neue',sans-serif" font-size="10" letter-spacing="7" text-anchor="middle" fill="${fg}" opacity="0.35">FOCUS</text>
      <!-- Illustration -->
      <g transform="translate(5,38)">${s.svg(fg,acc)}</g>
      <!-- Divider -->
      <line x1="30" y1="252" x2="180" y2="252" stroke="${fg}" stroke-width="0.6" opacity="0.3"/>
      <!-- Sport name -->
      <text x="105" y="268" font-family="'Bebas Neue',sans-serif" font-size="26" letter-spacing="7" text-anchor="middle" fill="${fg}">${s.name.toUpperCase()}</text>
      <!-- Palette name -->
      <text x="105" y="282" font-family="'Inter',sans-serif" font-size="6" letter-spacing="3" text-anchor="middle" fill="${fg}" opacity="0.3">${p.name.toUpperCase()}</text>
      <!-- Number -->
      <text x="196" y="292" font-family="'Inter',sans-serif" font-size="5.5" letter-spacing="1" text-anchor="end" fill="${fg}" opacity="0.2">${String(n).padStart(3,'0')}</text>
    </svg>
  </div>`;
}

// ─── BUILD FILTERS ─────────────────────────────────────────────────
const fDiv = document.getElementById('filters');
// Sports buttons
const sep1 = document.createElement('div'); sep1.className='sep'; fDiv.appendChild(sep1);
SPORTS.forEach(s=>{
  const b = document.createElement('button');
  b.className='fbtn'; b.textContent=s.name; b.dataset.f='sport'; b.dataset.v=s.id;
  b.onclick=()=>filter('sport',s.id,b);
  fDiv.appendChild(b);
});
const sep2 = document.createElement('div'); sep2.className='sep'; fDiv.appendChild(sep2);
// Palette buttons
PAL.forEach(p=>{
  const b = document.createElement('button');
  b.className='fbtn'; b.textContent=p.name; b.dataset.f='pal'; b.dataset.v=p.id;
  b.onclick=()=>filter('pal',p.id,b);
  fDiv.appendChild(b);
});

// ─── RENDER GALLERY ────────────────────────────────────────────────
document.getElementById('gallery').innerHTML = ALL.map(poster).join('');

// ─── FILTER LOGIC ─────────────────────────────────────────────────
let activeSport = 'all', activePal = 'all';
function filter(type, val, btn){
  if(type==='sport'){ activeSport=val; }
  else { activePal=val; }
  // Update button states
  document.querySelectorAll(`.fbtn[data-f="${type}"]`).forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  document.querySelectorAll('.fbtn[data-v="all"][data-f="'+type+'"]').forEach(b=>{ if(val==='all') b.classList.add('on'); else b.classList.remove('on'); });
  // Show/hide posters
  document.querySelectorAll('.poster-wrap').forEach(el=>{
    const showS = activeSport==='all' || el.dataset.sport===activeSport;
    const showP = activePal==='all' || el.dataset.pal===activePal;
    el.classList.toggle('hidden', !(showS && showP));
  });
}
</script>
