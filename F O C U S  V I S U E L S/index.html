<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FOCUS — Studio Visuel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F3EFE6;--dark:#14110F;--red:#C8412B;--navy:#162035;
  --bg:#0c0c0c;
}
body{background:var(--bg);font-family:'Bebas Neue',sans-serif;color:var(--cream)}

/* ─── HEADER ─── */
.site-header{
  padding:32px 44px 0;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #181818;
  padding-bottom:0;
}
.site-logo{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:10px;letter-spacing:.55em;opacity:.4;text-transform:uppercase;
  padding-bottom:28px;
}
.site-nav{display:flex;gap:0}
.nav-tab{
  background:none;border:none;border-bottom:2px solid transparent;
  color:#444;padding:0 0 26px;margin-left:36px;
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.18em;
  cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.nav-tab:hover{color:#888}
.nav-tab.on{color:var(--cream);border-bottom-color:var(--red)}
.nav-count{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:9px;letter-spacing:.15em;opacity:.3;
  padding-bottom:28px;
}

/* ─── SECTION WRAPPER ─── */
.section{display:none;padding:40px 44px 100px}
.section.on{display:block}

/* ─── FILTER BAR ─── */
.filterbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:40px}
.f-btn{
  background:none;border:1px solid #222;color:#444;
  padding:6px 18px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.15em;
  cursor:pointer;transition:all .18s;
}
.f-btn:hover,.f-btn.on{background:var(--cream);color:#0c0c0c;border-color:var(--cream)}
.sec-count{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:10px;letter-spacing:.2em;opacity:.25;
  margin-bottom:40px;margin-top:-28px;
}

/* ─── PHOTO GRID ─── */
.photo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:20px;
}
.pcard{
  position:relative;aspect-ratio:16/9;overflow:hidden;
  cursor:pointer;transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
.pcard:hover{transform:scale(1.016)}
.pcard-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s, filter .4s;
  filter:saturate(.7) brightness(.68);
}
.pcard:hover .pcard-img{transform:scale(1.04);filter:saturate(.85) brightness(.58)}
.pcard-grad{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(165deg,rgba(12,12,12,.06) 0%,rgba(12,12,12,0) 25%,rgba(12,12,12,.42) 65%,rgba(12,12,12,.95) 100%);
}
.pcard-content{
  position:absolute;inset:0;padding:22px 26px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.pc-top{display:flex;justify-content:space-between}
.pc-focus{font-family:'Inter',sans-serif;font-weight:300;font-size:9px;letter-spacing:.5em;opacity:.55;text-transform:uppercase}
.pc-num{font-family:'Inter',sans-serif;font-weight:300;font-size:9px;letter-spacing:.2em;opacity:.22}
.pc-tag{font-family:'Inter',sans-serif;font-weight:300;font-size:9px;letter-spacing:.2em;opacity:.28;text-transform:uppercase;margin-bottom:8px}
.pc-bar{width:28px;height:2px;background:var(--red);margin-bottom:12px}
.pcard.v-red .pc-bar{background:var(--cream)}
.pc-word{font-size:clamp(40px,4vw,64px);line-height:.92;letter-spacing:.025em;color:var(--cream);text-transform:uppercase;margin-bottom:7px}
.pcard.v-red .pc-word{color:var(--red)}
.pcard.v-thin .pc-word{font-size:clamp(28px,3vw,46px);letter-spacing:.08em}
.pc-sub{font-family:'Inter',sans-serif;font-weight:300;font-size:9.5px;letter-spacing:.2em;opacity:.42;text-transform:uppercase;line-height:1.6}
.pcard-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;opacity:0;transition:opacity .2s}
.pcard:hover .pcard-actions{opacity:1}
.pa-btn{background:rgba(12,12,12,.72);border:1px solid rgba(255,255,255,.1);color:var(--cream);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:background .2s}
.pa-btn:hover{background:var(--red)}

/* ─── AFFICHE GRID ─── */
.affiche-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.acard{
  cursor:pointer;
  transition:transform .25s cubic-bezier(.25,.46,.45,.94);
}
.acard:hover{transform:scale(1.035);z-index:2}
.acard svg{width:100%;height:auto;display:block}
.acard-label{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:9px;letter-spacing:.18em;color:#333;
  margin-top:6px;text-align:center;text-transform:uppercase;
}

/* ─── BOTTOM BAR ─── */
.bottombar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(12,12,12,.92);backdrop-filter:blur(12px);
  border-top:1px solid #1a1a1a;
  padding:12px 44px;
  display:flex;align-items:center;justify-content:space-between;
}
.b-info{font-family:'Inter',sans-serif;font-weight:300;font-size:9px;letter-spacing:.18em;opacity:.25;text-transform:uppercase}
.b-pdf{background:var(--cream);color:#0c0c0c;border:none;padding:10px 28px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.18em;cursor:pointer;transition:background .2s}
.b-pdf:hover{background:var(--red);color:var(--cream)}

@media print{
  body{background:#fff;padding:0}
  .site-header,.filterbar,.sec-count,.bottombar,.pcard-actions,.acard-label{display:none!important}
  .section{display:none!important;padding:0}
  .section.on.printing{display:block!important}
  .photo-grid,.affiche-grid{display:block}
  .pcard,.acard{page-break-after:always;margin:0}
  .pcard{aspect-ratio:unset;width:100vw;height:56.25vw}
  .acard svg{width:210mm;height:297mm}
  .pcard.hidden,.acard.hidden{display:none!important}
}
</style>
</head>

<script>
/* ═══════════════════════════════
   SECTION TOGGLE
═══════════════════════════════ */
function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  btn.classList.add('on');
}
function printSection(){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('printing'));
  const on = document.querySelector('.section.on');
  if(on) on.classList.add('printing');
  window.print();
}

(function buildPhotoGrid(){
  const grid = document.getElementById('photo-grid');
  PHOTOS.forEach((d,i)=>{
    const num = String(i+1).padStart(2,'0');
    const el = document.createElement('div');
    el.className = 'pcard ' + d.v;
    el.dataset.tag = d.t;
    el.innerHTML = `
      <img class="pcard-img" src="${d.f}" alt="${d.w}" loading="lazy">
      <div class="pcard-grad"></div>
      <div class="pcard-content">
        <div class="pc-top">
          <span class="pc-focus">Focus</span>
          <span class="pc-num">${num}/40</span>
        </div>
        <div>
          <div class="pc-tag">${d.t}</div>
          <div class="pc-bar"></div>
          <div class="pc-word">${d.w}</div>
          <div class="pc-sub">${d.s}</div>
        </div>
      </div>
      <div class="pcard-actions">
        <button class="pa-btn" onclick="dlPhoto(event,${i})">↓</button>
      </div>`;
    grid.appendChild(el);
  });
})();

let activePhotoTag = 'all';
function filterPhoto(tag,btn){
  activePhotoTag=tag;
  document.querySelectorAll('#photo-filters .f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  let n=0;
  document.querySelectorAll('#photo-grid .pcard').forEach(c=>{
    const show=tag==='all'||c.dataset.tag===tag;
    c.style.display=show?'':'none';
    if(show)n++;
  });
  document.getElementById('photo-count').textContent=n+' visuel'+(n>1?'s':'');
}

function dlPhoto(e,idx){
  e.stopPropagation();
  const d=PHOTOS[idx];
  const canvas=document.createElement('canvas');
  canvas.width=1920;canvas.height=1080;
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.filter='saturate(0.75) brightness(0.65)';
    ctx.drawImage(img,0,0,1920,1080);
    ctx.filter='none';
    const g=ctx.createLinearGradient(0,0,1920,1080);
    g.addColorStop(0,'rgba(12,12,12,.06)');
    g.addColorStop(.65,'rgba(12,12,12,.42)');
    g.addColorStop(1,'rgba(12,12,12,.96)');
    ctx.fillStyle=g;ctx.fillRect(0,0,1920,1080);
    ctx.fillStyle='rgba(243,239,230,.5)';ctx.font='300 17px Inter';
    ctx.fillText('F · O · C · U · S',52,54);
    const bc=d.v==='v-red'?'#F3EFE6':'#C8412B';
    ctx.fillStyle=bc;ctx.fillRect(52,950,44,2.5);
    const wc=d.v==='v-red'?'#C8412B':'#F3EFE6';
    const ws=d.v==='v-thin'?105:145;
    ctx.fillStyle=wc;ctx.font=`900 ${ws}px "Bebas Neue",Arial Black`;
    ctx.fillText(d.w,52,1040);
    ctx.fillStyle='rgba(243,239,230,.4)';ctx.font='300 16px Inter';
    ctx.fillText(d.s.toUpperCase(),52,1066);
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',.93);
    a.download=`focus-${d.w.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'-')}.jpg`;
    a.click();
  };
  img.src=d.f;
}

function poster(ref, sport, tag, bg, fg, ac, draw, sportName, subtitle){
  const gid='p'+ref;
  const inner = draw(bg,fg,ac);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" id="${gid}">
  <rect width="210" height="297" fill="${bg}"/>
  ${inner}
  <!-- Separator line -->
  <line x1="14" y1="252" x2="196" y2="252" stroke="${fg}" stroke-width=".8" opacity=".3"/>
  <!-- Sport name large -->
  <text x="14" y="269" fill="${fg}" font-family="'Bebas Neue',Arial Black,sans-serif" font-size="20" letter-spacing="3.5">${sportName}</text>
  <!-- Subtitle small -->
  <text x="14" y="280" fill="${fg}" font-family="'Inter',Arial,sans-serif" font-weight="300" font-size="7.5" letter-spacing="1.8" opacity=".45">${subtitle}</text>
  <!-- FOCUS top left -->
  <text x="14" y="20" fill="${fg}" font-family="'Bebas Neue',Arial Black,sans-serif" font-size="8.5" letter-spacing="3.5" opacity=".7">FOCUS</text>
  <!-- Ref bottom left -->
  <text x="14" y="291" fill="${fg}" font-family="'Inter',Arial,sans-serif" font-weight="300" font-size="7" letter-spacing="1.8" opacity=".35">#${String(ref).padStart(4,'0')}</text>
  <!-- Inner border -->
  <rect x="8" y="8" width="194" height="281" fill="none" stroke="${fg}" stroke-width=".5" opacity=".18"/>
</svg>`;
}

/* ── ILLUSTRATIONS ── */

// RUNNING 1 — Sprinter side silhouette, mid-stride
function d_piste_angle(bg,fg,ac){
  return `
  <!-- track ground -->
  <rect x="0" y="210" width="210" height="32" fill="${ac}"/>
  <line x1="0" y1="210" x2="210" y2="210" stroke="${fg}" stroke-width="3"/>
  <!-- lane stripe -->
  <line x1="0" y1="220" x2="210" y2="220" stroke="${bg}" stroke-width="1.5" opacity=".4"/>
  <line x1="0" y1="230" x2="210" y2="230" stroke="${bg}" stroke-width="1.5" opacity=".4"/>
  <!-- ground shadow -->
  <ellipse cx="115" cy="214" rx="38" ry="5" fill="${fg}" opacity=".18"/>
  <!-- back leg: thigh up-back, shin down -->
  <line x1="115" y1="155" x2="145" y2="185" stroke="${fg}" stroke-width="14" stroke-linecap="round"/>
  <line x1="145" y1="185" x2="155" y2="155" stroke="${fg}" stroke-width="12" stroke-linecap="round"/>
  <!-- front leg: thigh forward-down, shin to ground -->
  <line x1="115" y1="155" x2="88" y2="190" stroke="${fg}" stroke-width="14" stroke-linecap="round"/>

// NATATION 4 — Pool end-on perspective: lanes converging to vanishing point
function d_natation_lignes(bg,fg,ac){
  // 9 lane dividers converging from near-bottom to vanishing point (105, 70)
  const vx=105, vy=70;
  const nearXs = [14,37,60,83,105,127,150,173,196];
  let dividers = '';
  nearXs.forEach(x=>{
    dividers += `<line x1="${x}" y1="242" x2="${vx}" y2="${vy}" stroke="${fg}" stroke-width="1.8" opacity=".55"/>`;
  });
  // lane rope floats at intervals along each divider
  let floats = '';
  nearXs.forEach((x,li)=>{
    if(li===8) return;
    const midX = x + (nearXs[li+1]-x)/2;
    for(let t=0.25;t<1;t+=0.22){
      const fx = midX + (vx - midX)*t;
      const fy = 242 + (vy - 242)*t;
      floats += `<circle cx="${fx.toFixed(1)}" cy="${fy.toFixed(1)}" r="${(3.5*(1-t)).toFixed(1)}" fill="${li%2===0?fg:ac}" opacity=".65"/>`;
    }
  });
  // lane numbers at near end
  let nums = '';
  for(let i=0;i<8;i++){
    const nx = (nearXs[i]+nearXs[i+1])/2;
    nums += `<text x="${nx.toFixed(1)}" y="236" fill="${fg}" font-family="Arial Black" font-size="10" text-anchor="middle" opacity=".5">${i+1}</text>`;
  }
  return `
  <!-- water fill -->

// BASKET 1 — Basketball hoop from below, looking up
function d_basket_3pts(bg,fg,ac){
  // net lines from ring down
  let net = '';
  const ringCx=105, ringCy=118, ringR=52;
  const netBottom = 185;
  const numLines = 16;
  for(let i=0;i<numLines;i++){
    const angle = (i/numLines)*Math.PI*2;
    const x1 = ringCx + ringR*Math.cos(angle);
    const y1 = ringCy + ringR*0.32*Math.sin(angle);
    // converge to narrower base
    const x2 = ringCx + (ringR*0.28)*Math.cos(angle);
    const y2 = netBottom + (ringR*0.1)*Math.sin(angle);
    net += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${fg}" stroke-width="1.5" opacity=".6"/>`;
  }
  // horizontal net rings
  const netRings = [0.25, 0.5, 0.75, 1];
  netRings.forEach(t=>{
    const ry2 = ringR*(0.32 - 0.22*t);
    const rx2 = ringR*(1-0.72*t);
    const cy2 = ringCy + (netBottom-ringCy)*t;
    net += `<ellipse cx="${ringCx}" cy="${cy2.toFixed(1)}" rx="${rx2.toFixed(1)}" ry="${ry2.toFixed(1)}" fill="none" stroke="${fg}" stroke-width="1.2" opacity="${.55-t*.1}"/>`;
  });
  return `
  <!-- backboard -->
  <rect x="52" y="42" width="106" height="62" rx="3" fill="${fg}" opacity=".2"/>
  <rect x="52" y="42" width="106" height="62" fill="none" stroke="${fg}" stroke-width="3"/>

  <rect x="76" y="52" width="58" height="35" fill="none" stroke="${fg}" stroke-width="2"/>
  <!-- ring (orange, from below = ellipse) -->
  <ellipse cx="${ringCx}" cy="${ringCy}" rx="${ringR}" ry="${Math.round(ringR*0.32)}" fill="none" stroke="${ac}" stroke-width="8"/>
  <!-- net -->
  ${net}
  <!-- ball coming from above entering ring -->
  <circle cx="105" cy="68" r="22" fill="${ac}" opacity=".85"/>
  <!-- ball lines -->
  <path d="M84,60 Q105,72 126,60" fill="none" stroke="${bg}" stroke-width="2" opacity=".5"/>
  <line x1="105" y1="46" x2="105" y2="90" stroke="${bg}" stroke-width="2" opacity=".5"/>`;
}

(function buildAfficheGrid(){
  const grid = document.getElementById('affiche-grid');
  AFFICHES.forEach(a=>{
    const wrap = document.createElement('div');
    wrap.className = 'acard';
    wrap.dataset.tag = a.tag;
    wrap.innerHTML = poster(a.ref, a.sport, a.tag, a.bg, a.fg, a.ac, a.draw, a.sportName, a.subtitle);
    const lbl = document.createElement('div');
    lbl.className = 'acard-label';
    lbl.textContent = a.sportName + ' · #' + String(a.ref).padStart(4,'0');
    wrap.appendChild(lbl);
    grid.appendChild(wrap);
  });
})();

let activeAfficheTag = 'all';
function filterAffiche(tag,btn){
  activeAfficheTag=tag;
  document.querySelectorAll('#affiche-filters .f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  let n=0;
  document.querySelectorAll('#affiche-grid .acard').forEach(c=>{
    const show=tag==='all'||c.dataset.tag===tag;
    c.style.display=show?'':'none';
    if(show)n++;
  });
  document.getElementById('affiche-count').textContent=n+' affiche'+(n>1?'s':'');
}
