<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FOCUS — Export Vidéo</title>
  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }}
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;
         justify-content:center;min-height:100vh;gap:28px;
         font-family:'Helvetica Neue',Helvetica,sans-serif;}
    #c{display:block;width:540px;height:540px}
    .panel{display:flex;flex-direction:column;align-items:center;gap:16px}
    .btns{display:flex;gap:10px}
    button{
      background:#fff;color:#000;border:none;
      padding:11px 24px;font-size:9px;font-weight:700;
      letter-spacing:3px;text-transform:uppercase;cursor:pointer;
      transition:opacity .2s;
    }
    button:disabled{opacity:.3;cursor:not-allowed}
    button.dark{background:#1a2535;color:#fff}
    #status{
      color:#444;font-size:10px;letter-spacing:3px;
      text-transform:uppercase;font-family:monospace;
      min-height:16px;
    }
    .note{color:#333;font-size:10px;letter-spacing:1px;text-align:center;line-height:1.6}
  </style>
</head>
<body>

  <canvas id="c" width="1080" height="1080"></canvas>

  <div class="panel">
    <div id="status">Chargement du modèle…</div>

    <div class="btns">
      <button id="btn-all"   disabled>⏺ &nbsp;3 Couleurs (1 vidéo)</button>
      <button id="btn-kaki"  disabled class="dark">Kaki</button>
      <button id="btn-navy"  disabled class="dark">Navy</button>
      <button id="btn-beige" disabled class="dark">Beige</button>
    </div>

    <p class="note">
      Format 1080×1080 · Instagram carré<br>
      Chaque couleur = 1 rotation complète (~7 s) · fichier .webm
    </p>
  </div>

  <script type="module">
    import * as THREE         from 'three';
    import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
    import { SVGLoader }      from 'three/addons/loaders/SVGLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const canvas  = document.getElementById('c');
    const statusEl= document.getElementById('status');

    /* ── RENDERER ── */
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, preserveDrawingBuffer:true });
    renderer.setPixelRatio(1);
    renderer.setSize(1080, 1080);
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0E1520);
    scene.fog = new THREE.FogExp2(0x0E1520, 0.022);

    const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 60);
    camera.position.set(0, 0.3, 16);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    /* ── LIGHTS ── */
    scene.add(new THREE.AmbientLight(0x1a2030, 1.8));
    const key = new THREE.SpotLight(0xfff3e0, 80, 28, Math.PI/5, 0.38, 1.2);
    key.position.set(4.5, 9, 8); key.castShadow = true;
    key.shadow.mapSize.setScalar(2048); key.shadow.bias = -0.0005; key.shadow.radius = 5;
    scene.add(key, key.target);
    const rim = new THREE.DirectionalLight(0x6e8858, 3.0);
    rim.position.set(-7,3,-6); scene.add(rim);
    const fill = new THREE.DirectionalLight(0xb89870, 0.55);
    fill.position.set(2,-5,6); scene.add(fill);

    /* ── COLOURS ── */
    const PALETTE = {
      kaki:  { shirt: 0x6a7558, logo: 0xFFFFFF },
      navy:  { shirt: 0x162035, logo: 0xFFFFFF },
      beige: { shirt: 0xC8B89A, logo: 0x162035 },
    };

    const teeMat = new THREE.MeshPhysicalMaterial({
      color: PALETTE.kaki.shirt, roughness:.86, metalness:0,
      clearcoat:.05, clearcoatRoughness:.94, envMapIntensity:.4, side:THREE.DoubleSide,
    });
    const seriMat = new THREE.MeshBasicMaterial({
      color: PALETTE.kaki.logo, side:THREE.FrontSide,
      depthWrite:false, polygonOffset:true, polygonOffsetFactor:-1, polygonOffsetUnits:-4,
    });

    function applyColor(name) {
      teeMat.color.setHex(PALETTE[name].shirt); teeMat.needsUpdate = true;
      seriMat.color.setHex(PALETTE[name].logo); seriMat.needsUpdate = true;
    }

    /* ── SHADOW PLANE ── */
    const sp = new THREE.Mesh(new THREE.PlaneGeometry(24,24), new THREE.ShadowMaterial({opacity:.35}));
    sp.rotation.x = -Math.PI/2; sp.position.y = -3.2; sp.receiveShadow = true;
    scene.add(sp);

    /* ── SPIN GROUP ── */
    const spin = new THREE.Group();
    scene.add(spin);

    /* ── LOGO ── */
    function loadLogo(chestY, chestZ) {
      new SVGLoader().load('focus-logo-clean.svg', data => {
        const g = new THREE.Group();
        data.paths.forEach(p => SVGLoader.createShapes(p).forEach(shape => {
          const geo = new THREE.ShapeGeometry(shape, 8);
          geo.scale(1,-1,1);
          const idx = geo.index;
          if (idx) {
            const arr = idx.array;
            for (let i=0;i<arr.length;i+=3){const t=arr[i+1];arr[i+1]=arr[i+2];arr[i+2]=t;}
            idx.needsUpdate = true;
          }
          geo.computeVertexNormals();
          g.add(new THREE.Mesh(geo, seriMat));
        }));
        const b  = new THREE.Box3().setFromObject(g);
        const cx = (b.min.x+b.max.x)/2, cy=(b.min.y+b.max.y)/2, cz=(b.min.z+b.max.z)/2;
        g.children.forEach(m => m.geometry.translate(-cx,-cy,-cz));
        const b2 = new THREE.Box3().setFromObject(g);
        const w  = b2.max.x - b2.min.x;
        if (w>0) g.scale.setScalar(0.6/w);
        g.position.set(0, chestY, chestZ);
        spin.add(g);
      });
    }

    /* ── LOAD GLB ── */
    new GLTFLoader().load('t_shirt.glb', gltf => {
      statusEl.textContent = 'Prêt — choisis un format';
      const model = gltf.scene;
      model.traverse(n => { if (!n.isMesh) return; n.material=teeMat; n.castShadow=n.receiveShadow=true; });
      const box   = new THREE.Box3().setFromObject(model);
      const center= box.getCenter(new THREE.Vector3());
      const size  = box.getSize(new THREE.Vector3());
      const s     = 4.2/size.y;
      model.scale.setScalar(s);
      model.position.set(-center.x*s,-center.y*s,-center.z*s);
      spin.add(model);
      loadLogo(size.y*s*0.20, (box.max.z-center.z)*s);
      document.querySelectorAll('button').forEach(b=>b.disabled=false);
    }, undefined, () => { statusEl.textContent = '⚠ Erreur chargement GLB'; });

    /* ── RENDER LOOP ── */
    const clock = new THREE.Clock();
    let autoY = 0, recordSpeed = 0;
    (function loop(){
      const dt = clock.getDelta();
      autoY += dt * (recordSpeed || 0.33);
      spin.rotation.y  = autoY;
      spin.position.y  = Math.sin(clock.elapsedTime * 0.42) * 0.07;
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    })();

    /* ── RECORD HELPER ── */
    function getMime() {
      for (const t of ['video/mp4;codecs=avc1','video/webm;codecs=vp9','video/webm']) {
        if (MediaRecorder.isTypeSupported(t)) return t;
      }
      return 'video/webm';
    }
    const MIME = getMime();
    const EXT  = MIME.includes('mp4') ? 'mp4' : 'webm';

    // Show format info to user
    document.querySelector('.note').innerHTML =
      `Format 1080×1080 · Instagram carré<br>
       Format fichier : <strong>${EXT.toUpperCase()}</strong> ${EXT==='mp4'?'✓ Instagram ready':'— ouvrir dans Safari pour MP4'}<br>
       Fichiers téléchargés dans <strong>Téléchargements</strong>`;

    function download(chunks, name) {
      const blob = new Blob(chunks, { type: MIME });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 8000);
    }

    function recordClip(colorName, durationMs) {
      return new Promise(resolve => {
        applyColor(colorName);
        recordSpeed = (2 * Math.PI) / (durationMs / 1000);
        statusEl.textContent = `● Enregistrement ${colorName.toUpperCase()}…`;
        const rec    = new MediaRecorder(canvas.captureStream(60), { mimeType:MIME, videoBitsPerSecond:12_000_000 });
        const chunks = [];
        rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
        rec.onstop = () => { recordSpeed = 0; download(chunks, `focus-tshirt-${colorName}.${EXT}`); resolve(); };
        rec.start(100);
        setTimeout(()=>rec.stop(), durationMs);
      });
    }

    const DUR = 7000;

    document.getElementById('btn-kaki').onclick = async () => {
      disableAll(true);
      await recordClip('kaki', DUR);
      statusEl.textContent = `✓ focus-tshirt-kaki.${EXT} dans Téléchargements`;
      disableAll(false);
    };
    document.getElementById('btn-navy').onclick = async () => {
      disableAll(true);
      await recordClip('navy', DUR);
      statusEl.textContent = `✓ focus-tshirt-navy.${EXT} dans Téléchargements`;
      disableAll(false);
    };
    document.getElementById('btn-beige').onclick = async () => {
      disableAll(true);
      await recordClip('beige', DUR);
      statusEl.textContent = `✓ focus-tshirt-beige.${EXT} dans Téléchargements`;
      disableAll(false);
    };
    document.getElementById('btn-all').onclick = async () => {
      disableAll(true);
      statusEl.textContent = '⏺ Enregistrement — kaki → navy → beige…';
      const rec    = new MediaRecorder(canvas.captureStream(60), { mimeType:MIME, videoBitsPerSecond:12_000_000 });
      const chunks = [];
      rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      rec.onstop = () => {
        recordSpeed = 0;
        download(chunks, `focus-capsule-01-3couleurs.${EXT}`);
        statusEl.textContent = `✓ focus-capsule-01-3couleurs.${EXT} dans Téléchargements`;
        disableAll(false);
      };
      const speed = (2*Math.PI) / (DUR/1000);
      rec.start(100);
      for (const col of ['kaki','navy','beige']) {
        applyColor(col);
        recordSpeed = speed;
        statusEl.textContent = `● ${col.toUpperCase()}`;
        await new Promise(r=>setTimeout(r, DUR));
      }
      rec.stop();
    };

    function disableAll(v){ document.querySelectorAll('button').forEach(b=>b.disabled=v); }
  </script>
</body>
</html>
