<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOCUS — Inscription</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo img {
      width: clamp(160px, 26vw, 300px);
      height: auto;
      display: block;
      margin: 0 auto;
      filter: invert(1) brightness(3);
    }

    .logo p {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      margin-top: 8px;
    }

    .form-box {
      background: #111;
      border: 1px solid #222;
      padding: 40px;
    }

    .form-title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 32px;
      text-align: center;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #555;
    }

    .field input::placeholder {
      color: #333;
    }

    button[type="submit"] {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      font-family: inherit;
    }

    button[type="submit"]:hover {
      background: #ddd;
    }

    .success {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .success h2 {
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .success p {
      font-size: 13px;
      color: #666;
      letter-spacing: 1px;
    }

    .note {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 24px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="focus-logo-clean.svg" alt="FOCUS">
      <p>Première collection</p>
    </div>

    <div class="form-box">
      <p class="form-title">Rejoindre la liste</p>

      <form id="focusForm">
        <div class="row">
          <div class="field">
            <label>Prénom</label>
            <input type="text" id="prenom" placeholder="Prénom" required>
          </div>
          <div class="field">
            <label>Nom</label>
            <input type="text" id="nom" placeholder="Nom" required>
          </div>
        </div>

        <div class="field">
          <label>Adresse email</label>
          <input type="email" id="email" placeholder="email@exemple.com" required>
        </div>

        <div class="field">
          <label>Téléphone</label>
          <input type="tel" id="telephone" placeholder="+33 6 00 00 00 00">
        </div>

        <div class="row">
          <div class="field">
            <label>Âge</label>
            <input type="number" id="age" placeholder="25" min="14" max="99">
          </div>
          <div class="field">
            <label>Ville</label>
            <input type="text" id="ville" placeholder="Paris">
          </div>
        </div>

        <div class="field">
          <label>Adresse postale</label>
          <input type="text" id="adresse" placeholder="12 rue de la Paix, 75001 Paris">
        </div>

        <button type="submit">S'inscrire</button>
      </form>

      <div class="success" id="successMsg">
        <h2>Bienvenue</h2>
        <p>Tu seras parmi les premiers informés.</p>
      </div>
    </div>

    <p class="note">Données utilisées uniquement pour la newsletter FOCUS</p>
  </div>

  <script>
    const JSONBIN_KEY = 'COLLE_TON_TOKEN_ICI';
    const JSONBIN_BIN = 'COLLE_TON_BIN_ID';

    document.getElementById('focusForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const client = {
        prenom: document.getElementById('prenom').value.trim(),
        nom: document.getElementById('nom').value.trim(),
        email: document.getElementById('email').value.trim(),
        telephone: document.getElementById('telephone').value.trim(),
        age: document.getElementById('age').value.trim(),
        ville: document.getElementById('ville').value.trim(),
        adresse: document.getElementById('adresse').value.trim(),
        date: new Date().toLocaleDateString('fr-FR')
      };

      // Sauvegarder dans JSONBin si configuré
      if (JSONBIN_KEY !== 'COLLE_TON_TOKEN_ICI') {
        try {
          const getRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_KEY }
          });
          const data = await getRes.json();
          const existing = data.record || {};
          const clients = existing.clients || [];
          clients.push(client);

          await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
            body: JSON.stringify({ ...existing, clients })
          });
        } catch(err) {
          console.log('Sync cloud non disponible');
        }
      }

      document.getElementById('focusForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    });
  </script>
</body>
</html>
